name: Publish next social post

on:
  schedule:
    # Mon/Wed/Fri 08:00 UTC = 18:00 AEST / 10:00 CEST
    - cron: "0 8 * * 1,3,5"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (validate only, publish nothing)"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Publish next post in queue
        env:
          META_TOKEN: ${{ secrets.META_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          DRY_RUN: ${{ inputs.dry_run && '1' || '0' }}
        run: python3 scripts/publish.py

      - name: Commit queue -> posted move
        run: |
          git config user.name "wildr-social-bot"
          git config user.email "actions@github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Published post $(date -u +%F)"
          git push
