name: Diagnose page posts

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Check recent posts visibility
        env:
          META_TOKEN: ${{ secrets.META_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
        run: |
          curl -s "https://graph.facebook.com/v21.0/${FB_PAGE_ID}/feed?fields=created_time,is_published,is_hidden,is_expired,privacy{value,description},permalink_url,message&limit=5&access_token=${META_TOKEN}" \
            | python3 -c "
          import json,sys
          data = json.load(sys.stdin)
          for p in data.get('data', []):
              print(p['created_time'],
                    '| published:', p.get('is_published'),
                    '| hidden:', p.get('is_hidden'),
                    '| privacy:', p.get('privacy',{}).get('value'),
                    '|', (p.get('message','') or '')[:40].replace(chr(10),' '))
          print('---')
          print(json.dumps(data.get('error'), indent=2) if 'error' in data else 'OK')
          "
