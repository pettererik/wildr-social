name: Diagnose page posts

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Check recent posts visibility
        env:
          META_TOKEN: ${{ secrets.META_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
        run: |
          python3 - << 'EOF'
          import json, os, urllib.request, urllib.parse
          token = os.environ["META_TOKEN"]
          page = os.environ["FB_PAGE_ID"]
          url = (f"https://graph.facebook.com/v21.0/{page}/feed?"
                 f"fields=created_time,is_published,is_hidden,privacy{{value}},message"
                 f"&limit=5&access_token={urllib.parse.quote(token)}")
          data = json.loads(urllib.request.urlopen(url, timeout=60).read())
          if "error" in data:
              print("API-FEIL:", data["error"].get("message"))
          for p in data.get("data", []):
              msg = (p.get("message") or "")[:40].replace("\n", " ")
              print(f"{p['created_time']} | published={p.get('is_published')} "
                    f"| hidden={p.get('is_hidden')} "
                    f"| privacy={p.get('privacy',{}).get('value')} | {msg}")
          print(f"TOTALT: {len(data.get('data', []))} poster i feeden")
          EOF
